<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nature vs Genetics</title>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f8fffa;
  margin: 0;
  padding: 40px;
  color: #2B2B2B;
}

h2 {
  font-size: 32px;
  margin-bottom: 25px;
  color: #3F7F34;
}

.split-compare {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.compare-box {
  flex: 1;
  min-width: 250px;
  padding: 20px;
  background: #f0fff7;
  border-radius: 14px;
  border: 2px solid #4a9c5d;
}

.compare-box h3 {
  margin-bottom: 12px;
}

nav a {
  text-decoration: none;
  color: #3F7F34;
  font-weight: bold;
}
</style>
</head>
<body>

<nav>
  <a href="index.html">← Back to Home</a>
</nav>

<section>
  <h2>Nature vs Genetics</h2>

  <div class="split-compare">

    <div class="compare-box">
      <h3>🌴 Person A — Hawaii</h3>
      <ul>
        <li>Eats pineapple, papaya, ginger</li>
        <li>High natural enzyme intake</li>
        <li>May digest gluten more comfortably</li>
      </ul>
    </div>

    <div class="compare-box">
      <h3>❄️ Person B — Finland</h3>
      <ul>
        <li>Eats fewer tropical fruits</li>
        <li>Lower natural enzyme intake</li>
        <li>May feel stronger irritation</li>
      </ul>
    </div>

  </div>

</section>

</body>
</html>
